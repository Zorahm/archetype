name: Build

on:
  push:
    branches: [ master, 1.20.1 ]
  pull_request:
    branches: [ master, 1.20.1 ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Upload Fabric JAR
        uses: actions/upload-artifact@v4
        with:
          name: archetype-fabric
          path: fabric/build/libs/archetype-*.jar
          if-no-files-found: error

      - name: Upload Forge JAR
        uses: actions/upload-artifact@v4
        with:
          name: archetype-forge
          path: forge/build/libs/archetype-*.jar
          if-no-files-found: error
